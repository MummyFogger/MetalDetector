; PlatformIO Project Configuration File for Teensy 4.1 PI Metal Detector
; -----------------------------------------------------------------------

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; Serial Monitor settings (Teensy 4.1 handles high baud rates over USB)
monitor_speed = 115200
monitor_filters = time, colorize

; Optimization: -O3 tells the compiler to prioritize speed (crucial for DSP)
build_flags = 
    -O3
    -D USB_SERIAL

; Libraries for this specific project
lib_deps =
    # High-performance SPI library for the display (Teensy-optimized)
    PaulStoffregen/ILI9341_t3
    
    # Advanced ADC library for MSPS sampling and hardware averaging
    # Note: Using the pedvide version which is the standard for Teensy
    https://github.com/pedvide/ADC.git

    # Standard SPI and Wire (usually built-in, but good to track)
    SPI
    Wire

; Upload settings
upload_protocol = teensy-gui